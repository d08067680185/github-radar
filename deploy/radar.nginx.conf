# GitHub Radar —— 宿主机 nginx 站点配置（与 kids.mxzshs.com 同机共存）
# 放到 /etc/nginx/conf.d/ 后:  sudo nginx -t && sudo systemctl reload nginx
# 把 <RADAR_DOMAIN> 替换成实际子域名（如 radar.mxzshs.com）。WEB_PORT 与 .env.prod 一致(默认 8090)。
#
# 证书：首次用 certbot 签发  ->  sudo certbot --nginx -d <RADAR_DOMAIN>
#   （证书路径 /etc/letsencrypt/live/<RADAR_DOMAIN>/ 由 certbot 维护、自动续期）

# 公开站点限流（防爬虫/滥用）——后端在内网不直接暴露，限流放这一层
limit_req_zone $binary_remote_addr zone=radar:10m rate=20r/s;

# --- HTTP: 强制跳转 HTTPS（保留 ACME 续期通道）---
server {
    listen 80;
    server_name <RADAR_DOMAIN>;

    # Let's Encrypt 续期校验，必须放在 301 之前
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS: 反代到前端容器 ---
server {
    listen 443 ssl;
    http2 on;
    server_name <RADAR_DOMAIN>;

    ssl_certificate     /etc/letsencrypt/live/<RADAR_DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<RADAR_DOMAIN>/privkey.pem;

    location / {
        limit_req zone=radar burst=40 nodelay;
        proxy_pass http://127.0.0.1:8090;          # = compose 里的 WEB_PORT
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:8090;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
