# GitHub Radar —— 宿主机 nginx 的站点配置（与 kids.mxzshs.com 同机共存）
# 放到 /etc/nginx/conf.d/ 或 sites-available/ 后:
#   sudo nginx -t && sudo systemctl reload nginx
# TLS 用 certbot 自动签发:
#   sudo certbot --nginx -d <你的子域名>
#
# 把 <RADAR_DOMAIN> 替换成实际子域名（如 radar.mxzshs.com），WEB_PORT 与 .env.prod 一致。

# 公开站点的限流（防爬虫/滥用）—— 后端在内网不直接暴露，限流就放在这一层
limit_req_zone $binary_remote_addr zone=radar:10m rate=20r/s;

server {
    listen 80;
    server_name <RADAR_DOMAIN>;

    # certbot 会自动加 443 + 证书 + 80→443 跳转；首次签发前先用 80 验证
    location / {
        limit_req zone=radar burst=40 nodelay;

        proxy_pass http://127.0.0.1:8090;   # = compose 里的 WEB_PORT
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next 静态资源长缓存
    location /_next/static/ {
        proxy_pass http://127.0.0.1:8090;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
