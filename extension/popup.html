<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Radar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px; min-height: 100px;
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; border-bottom: 1px solid #30363d;
    }
    .header a {
      color: #58a6ff; text-decoration: none; font-size: 12px; margin-left: auto;
    }
    h2 { font-size: 15px; font-weight: 700; }
    .search-wrap { padding: 10px 14px; display: flex; gap: 6px; }
    #query {
      flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      color: #e6edf3; padding: 6px 10px; font-size: 13px; outline: none;
    }
    #query:focus { border-color: #58a6ff; }
    button {
      background: #238636; color: #fff; border: none; border-radius: 6px;
      padding: 6px 12px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #2ea043; }
    #results { padding: 0 14px 14px; max-height: 320px; overflow-y: auto; }
    .item {
      border-bottom: 1px solid #21262d; padding: 8px 0;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .item:last-child { border-bottom: none; }
    .item a { color: #58a6ff; text-decoration: none; font-size: 13px; font-weight: 600; }
    .item a:hover { text-decoration: underline; }
    .meta { color: #8b949e; font-size: 11px; margin-top: 2px; }
    .score { font-size: 16px; font-weight: 700; color: #3fb950; min-width: 32px; text-align: right; }
    .empty { color: #8b949e; padding: 12px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <span>🛰️</span>
    <h2>GitHub Radar</h2>
    <a href="https://radar.mxzshs.com" target="_blank">打开网站 →</a>
  </div>
  <div class="search-wrap">
    <input id="query" type="text" placeholder="搜索开源项目…" autofocus>
    <button id="searchBtn">搜索</button>
  </div>
  <div id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
